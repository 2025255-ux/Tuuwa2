<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC ビデオ通話</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .video-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        video { background: #000; border-radius: 8px; width: 400px; height: 300px; object-fit: cover; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #hangupBtn { background: #dc3545; }
    </style>
</head>
<body>

    <h1>ビデオ通話アプリ</h1>
    
    <div class="video-container">
        <div>
            <h3>あなた</h3>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <h3>相手</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="callBtn" disabled>発信</button>
        <button id="hangupBtn" disabled>切断</button>
    </div>

    <!-- サーバー側でSocket.IOを使用している前提 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const callBtn = document.getElementById('callBtn');
        const hangupBtn = document.getElementById('hangupBtn');

        let localStream;
        let peerConnection;
        // CodeSandboxのサーバーに接続
        const socket = io(); 

        // Googleの無料STUNサーバーを利用してP2P通信を確立
        const rtcConfig = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        // 1. カメラとマイクの取得
        async function startMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                callBtn.disabled = false; // カメラが取得できたら発信ボタンを有効化
            } catch (error) {
                console.error('カメラ・マイクの取得に失敗しました:', error);
                alert('カメラとマイクのアクセスを許可してください。');
            }
        }

        // WebRTCのPeerConnectionセットアップ
        function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            // 自分の映像・音声をコネクションに追加
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // 相手の映像を受信したときの処理
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
            };

            // 通信経路の候補（ICE Candidate）が見つかったら相手に送信
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc-ice-candidate', event.candidate);
                }
            };
        }

        // 2. 発信ボタンを押したときの処理 (Offerの作成)
        callBtn.addEventListener('click', async () => {
            setupPeerConnection();
            hangupBtn.disabled = false;
            callBtn.disabled = true;

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // サーバー経由で相手にOfferを送信
            socket.emit('webrtc-offer', offer);
        });

        // 切断処理
        hangupBtn.addEventListener('click', () => {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            hangupBtn.disabled = true;
            callBtn.disabled = false;
        });

        // 3. シグナリングサーバーからのメッセージ受信処理

        // 相手からの着信（Offer）を受け取ったとき
        socket.on('webrtc-offer', async (offer) => {
            setupPeerConnection();
            hangupBtn.disabled = false;
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            
            // 返答（Answer）を作成して相手に送信
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('webrtc-answer', answer);
        });

        // 相手からの返答（Answer）を受け取ったとき
        socket.on('webrtc-answer', async (answer) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        });

        // 相手からの通信経路情報（ICE Candidate）を受け取ったとき
        socket.on('webrtc-ice-candidate', async (candidate) => {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch (error) {
                console.error('ICE候補の追加エラー:', error);
            }
        });

        // アプリ起動時にカメラを取得
        startMedia();
    </script>
</body>
</html>
